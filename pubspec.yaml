name: painting_hero
description: A management app for an art academy (Pussy Station) with an 8-bit metro aesthetic.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: 2.6.0
  google_fonts: ^6.0.0
  flutter_riverpod: ^2.0.0
  intl: ^0.19.0
  collection: ^1.18.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/parts/

